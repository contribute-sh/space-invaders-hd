<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Space Invaders MVP</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Arial Narrow", "Avenir Next Condensed", "Trebuchet MS",
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(38, 93, 255, 0.28), transparent 38%),
          linear-gradient(180deg, #09101f 0%, #04060e 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(58, 131, 255, 0.18), transparent 42%),
          linear-gradient(180deg, #0b1020 0%, #03050c 100%);
        color: #f7fbff;
      }

      .shell {
        width: min(100vw, 1120px);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .frame {
        width: min(100%, 960px);
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .headline {
        margin: 0;
        font-size: clamp(1.2rem, 1rem + 1vw, 1.9rem);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #bde6ff;
      }

      .subhead {
        margin: 0;
        text-align: center;
        color: rgba(216, 238, 255, 0.78);
        max-width: 48rem;
      }

      canvas {
        width: min(100%, 960px);
        aspect-ratio: 4 / 3;
        display: block;
        border: 1px solid rgba(151, 198, 255, 0.3);
        border-radius: 24px;
        background: #02050f;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .fallback {
        padding: 24px;
        border-radius: 18px;
        background: rgba(12, 18, 36, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        max-width: 38rem;
      }

      @media (max-width: 720px) {
        .shell {
          padding: 16px;
        }

        .subhead {
          font-size: 0.95rem;
        }

        canvas {
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="frame" aria-label="Game shell">
        <p class="headline">Space Invaders MVP</p>
        <p class="subhead">
          Arrow keys move, space fires, and P pauses. Geometry-only visuals,
          fixed-step gameplay, and synthesized audio.
        </p>
        <canvas
          id="game"
          width="960"
          height="720"
          aria-label="Space Invaders playfield"
        ></canvas>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
